<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380">
  <style>
    .title { font-family: 'Courier New', Courier, monospace; font-weight: bold; fill: #00f2ff; font-size: 16px; letter-spacing: 1px; }
    .sub-title { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #a855f7; }
    .skill-name { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 13px; fill: #e2e8f0; font-weight: 500; }
    .skill-desc { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; fill: #64748b; }
    .value { font-family: 'Courier New', Courier, monospace; font-size: 12px; fill: #00f2ff; font-weight: bold; }
    .game-text { fill: #64748b !important; }
    .game-title { fill: #475569 !important; }
  </style>
  
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="100%" stop-color="#030305" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#12121e" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Card -->
  <rect x="2" y="2" width="796" height="376" rx="12" fill="url(#bg-grad)" stroke="url(#border-grad)" stroke-width="2" />
  <rect x="2" y="2" width="796" height="376" rx="12" fill="url(#grid)" />

  <!-- LEFT COLUMN -->
  <!-- GenAI & RAG Card (X: 30, Y: 30) -->
  <g transform="translate(30, 30)">
    <text x="0" y="20" class="title">&gt;_ GEN_AI &amp; RAG MODULES</text>
    <text x="0" y="35" class="sub-title">CORE COGNITIVE PIPELINES</text>
    
    <!-- Skill 1: LangGraph -->
    <g transform="translate(0, 55)">
      <text x="0" y="15" class="skill-name">LangGraph Orchestration</text>
      <text x="180" y="15" class="skill-desc">(Agentic Workflows)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="304" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">95%</text>
    </g>

    <!-- Skill 2: LangChain -->
    <g transform="translate(0, 105)">
      <text x="0" y="15" class="skill-name">LangChain Architectures</text>
      <text x="180" y="15" class="skill-desc">(RAG Pipelines)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="288" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">90%</text>
    </g>

    <!-- Skill 3: VectorDBs -->
    <g transform="translate(0, 155)">
      <text x="0" y="15" class="skill-name">ChromaDB &amp; FAISS Indexing</text>
      <text x="180" y="15" class="skill-desc">(Semantic Search)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="288" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">90%</text>
    </g>
  </g>

  <!-- Computer Vision Card (X: 30, Y: 240) -->
  <g transform="translate(30, 240)">
    <text x="0" y="20" class="title">&gt;_ COMPUTER VISION MODULES</text>
    <text x="0" y="35" class="sub-title">PERCEPTUAL INFERENCE ENGINES</text>
    
    <!-- Skill 1: YOLO & OpenCV -->
    <g transform="translate(0, 50)">
      <text x="0" y="15" class="skill-name">YOLOv8 &amp; OpenCV</text>
      <text x="180" y="15" class="skill-desc">(Real-Time Obstacle Detection)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="288" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">90%</text>
    </g>
  </g>

  <!-- RIGHT COLUMN -->
  <!-- Backend & Databases (X: 420, Y: 30) -->
  <g transform="translate(420, 30)">
    <text x="0" y="20" class="title">&gt;_ BACKEND &amp; DATA CORE</text>
    <text x="0" y="35" class="sub-title">API SERVICES &amp; INTEGRATION</text>
    
    <!-- Skill 1: FastAPI / Flask -->
    <g transform="translate(0, 55)">
      <text x="0" y="15" class="skill-name">FastAPI &amp; Flask</text>
      <text x="180" y="15" class="skill-desc">(Async REST endpoints)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="272" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">85%</text>
    </g>

    <!-- Skill 2: Databases -->
    <g transform="translate(0, 105)">
      <text x="0" y="15" class="skill-name">SQL &amp; Cloud Datastores</text>
      <text x="180" y="15" class="skill-desc">(PostgreSQL / SQLite / Firebase)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="272" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">85%</text>
    </g>

    <!-- Skill 3: OCR Pipelines -->
    <g transform="translate(0, 155)">
      <text x="0" y="15" class="skill-name">Multilingual OCR Pipelines</text>
      <text x="180" y="15" class="skill-desc">(PaddleOCR / EasyOCR / Tesseract)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="288" height="6" rx="3" fill="url(#bar-grad)" />
      <text x="330" y="30" class="value">90%</text>
    </g>
  </g>

  <!-- Game Dev Sub-routine (X: 420, Y: 240) -->
  <g transform="translate(420, 240)">
    <text x="0" y="20" class="title game-title">&gt;_ GAME_DEV SUB-ROUTINE</text>
    <text x="0" y="35" class="sub-title game-text">SECONDARY SYSTEMS</text>
    
    <!-- Skill 1: Unity & Sentis -->
    <g transform="translate(0, 50)">
      <text x="0" y="15" class="skill-name game-text">Unity AR &amp; On-Device Inference</text>
      <text x="210" y="15" class="skill-desc game-text">(Unity Sentis)</text>
      <rect x="0" y="23" width="320" height="6" rx="3" fill="#1e1e2f" />
      <rect x="0" y="23" width="192" height="6" rx="3" fill="#475569" />
      <text x="330" y="30" class="value game-text">60%</text>
    </g>
  </g>
</svg>
